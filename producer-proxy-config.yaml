#
# Producer sidecar: two virtual clusters exposing source and dest Kafka clusters.
#   source-cluster: producer-proxy:9192 -> kafka-source:9092
#   dest-cluster:   producer-proxy:9194 -> kafka-dest:9092
#
---
virtualClusters:
  - name: source-cluster
    targetCluster:
      bootstrapServers: kafka-source:9092
    gateways:
      - name: default
        portIdentifiesNode:
          bootstrapAddress: producer-proxy:9192
          nodeIdRanges:
            - name: "default"
              start: 1
              end: 1
    logNetwork: false
    logFrames: false
  - name: dest-cluster
    targetCluster:
      bootstrapServers: kafka-dest:9092
    gateways:
      - name: default
        portIdentifiesNode:
          bootstrapAddress: producer-proxy:9194
          nodeIdRanges:
            - name: "default"
              start: 1
              end: 1
    logNetwork: false
    logFrames: false
